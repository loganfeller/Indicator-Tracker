<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>US Macro Forecast Dashboard</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 40px; color: #111; }
    h1 { margin-bottom: 4px; }
    .sub { color: #666; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
    .card { border: 1px solid #ddd; border-radius: 14px; padding: 18px; }
    .metric { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
    .row { display: flex; justify-content: space-between; border-top: 1px solid #eee; padding: 10px 0; }
    .row:first-of-type { border-top: none; }
    .label { color: #666; }
    .value { font-weight: 650; }
    .note { margin-top: 28px; color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <h1>US Macro Forecast Dashboard</h1>
  <div class="sub">Prediction markets vs official economic indicators</div>

  <div class="grid" id="dashboard"></div>

  <div class="note">
    Data loads from <code>data.json</code>. GitHub Actions will update it automatically later.
  </div>

  <script>
    async function loadData() {
      const res = await fetch("data.json");
      const data = await res.json();

      const dashboard = document.getElementById("dashboard");

      dashboard.innerHTML = data.metrics.map(m => `
        <div class="card">
          <div class="metric">${m.name}</div>
          <div class="row">
            <span class="label">Official latest</span>
            <span class="value">${m.official ?? "—"}</span>
          </div>
          <div class="row">
            <span class="label">Prediction market</span>
            <span class="value">${m.prediction_market ?? "—"}</span>
          </div>
          <div class="row">
            <span class="label">Consensus</span>
            <span class="value">${m.consensus ?? "—"}</span>
          </div>
          <div class="row">
            <span class="label">Source</span>
            <span class="value">${m.source ?? "—"}</span>
          </div>
        </div>
      `).join("");
    }

    loadData();
  </script>
</body>
</html>
